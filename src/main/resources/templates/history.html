<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Previous Periods</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>Previous Period Dates</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Symptoms</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="p : ${history}">
            <td th:text="${p.startDate}"></td>
            <td th:text="${p.endDate}"></td>
            <td th:text="${p.symptoms}"></td>
        </tr>
    </tbody>

</table>

</body>
</html>
